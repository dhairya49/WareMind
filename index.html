<!doctype html>
<html lang="en" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WareMind - Inventory Management</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <script src="/_sdk/element_sdk.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&amp;family=Outfit:wght@600;700;800&amp;display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            display: ['Outfit', 'sans-serif'],
            body: ['DM Sans', 'sans-serif']
          },
          colors: {
            brand: {
              50: '#eef2ff',
              100: '#e0e7ff',
              200: '#c7d2fe',
              300: '#a5b4fc',
              400: '#818cf8',
              500: '#6366f1',
              600: '#4f46e5',
              700: '#4338ca',
              800: '#3730a3',
              900: '#312e81'
            }
          }
        }
      }
    }
  </script>
  <style>
    html, body { height: 100%; margin: 0; font-family: 'DM Sans', sans-serif; }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(24px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInRight {
      from { opacity: 0; transform: translateX(30px); }
      to { opacity: 1; transform: translateX(0); }
    }
    @keyframes slideInLeft {
      from { opacity: 0; transform: translateX(-30px); }
      to { opacity: 1; transform: translateX(0); }
    }
    @keyframes pulse-glow {
      0%, 100% { box-shadow: 0 0 20px rgba(99,102,241,0.15); }
      50% { box-shadow: 0 0 40px rgba(99,102,241,0.25); }
    }
    @keyframes toast-in {
      from { opacity: 0; transform: translateY(-16px) scale(0.95); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }
    @keyframes toast-out {
      from { opacity: 1; transform: translateY(0) scale(1); }
      to { opacity: 0; transform: translateY(-16px) scale(0.95); }
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-8px); }
    }
    @keyframes shimmer {
      0%, 100% { background-position: -1000px 0; }
      50% { background-position: 1000px 0; }
    }
    @keyframes blob {
      0%, 100% { transform: translate(0, 0) scale(1); }
      25% { transform: translate(20px, -30px) scale(1.1); }
      50% { transform: translate(-20px, 20px) scale(0.9); }
      75% { transform: translate(30px, 30px) scale(1.05); }
    }
    @keyframes gradient-shift {
      0%, 100% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
    }
    @keyframes bounce-in {
      0% { transform: scale(0.3); opacity: 0; }
      50% { opacity: 1; }
      70% { transform: scale(1.05); }
      100% { transform: scale(1); }
    }
    @keyframes chart-fill {
      from { stroke-dashoffset: 565; }
      to { stroke-dashoffset: 0; }
    }
    @keyframes counter {
      from { opacity: 0; transform: scale(0.8); }
      to { opacity: 1; transform: scale(1); }
    }

    .anim-fade-up { animation: fadeInUp 0.5s ease-out forwards; }
    .chart-animate { animation: chart-fill 2s ease-out forwards; }
    .counter-animate { animation: counter 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; }
    .anim-fade-in { animation: fadeIn 0.4s ease-out forwards; }
    .anim-slide-right { animation: slideInRight 0.4s ease-out forwards; }
    .anim-slide-left { animation: slideInLeft 0.4s ease-out forwards; }
    .card-glow { animation: pulse-glow 3s ease-in-out infinite; }
    .toast-enter { animation: toast-in 0.3s ease-out forwards; }
    .toast-exit { animation: toast-out 0.3s ease-in forwards; }
    .spinner { animation: spin 0.7s linear infinite; }
    .float-anim { animation: float 3s ease-in-out infinite; }
    .blob-anim { animation: blob 6s ease-in-out infinite; }
    .gradient-anim { animation: gradient-shift 3s ease infinite; background-size: 200% 200%; }
    .bounce-in { animation: bounce-in 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; }

    .input-field {
      transition: all 0.3s ease;
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(8px);
      color: #1e293b;
      border: 1px solid #e2e8f0;
    }
    .input-field:focus {
      background: rgba(255, 255, 255, 1);
      box-shadow: 0 0 0 3px rgba(14, 165, 233, 0.1);
      transform: translateY(-2px);
      border-color: #0ea5e9;
    }
    .input-field::placeholder {
      color: #94a3b8;
    }

    .btn-primary {
      background: linear-gradient(135deg, #0ea5e9 0%, #0284c7 100%);
      transition: all 0.3s ease;
      box-shadow: 0 4px 15px rgba(14, 165, 233, 0.2);
    }
    .btn-primary:hover:not(:disabled) {
      background: linear-gradient(135deg, #06b6d4 0%, #0369a1 100%);
      transform: translateY(-3px);
      box-shadow: 0 8px 25px rgba(14, 165, 233, 0.3);
    }
    .btn-primary:active:not(:disabled) {
      transform: translateY(-1px);
    }
    .btn-primary:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .btn-secondary {
      background: rgba(255, 255, 255, 0.9);
      border: 2px solid #e2e8f0;
      backdrop-filter: blur(8px);
      transition: all 0.3s ease;
      color: #1e293b;
    }
    .btn-secondary:hover {
      background: rgba(14, 165, 233, 0.05);
      border-color: #0ea5e9;
      transform: translateY(-2px);
    }

    .bg-pattern {
      background: linear-gradient(135deg, #ffffff 0%, #f9fafb 25%, #f3f4f6 50%, #eeeff2 75%, #ffffff 100%);
      background-size: 400% 400%;
      animation: gradient-anim 15s ease infinite;
      position: relative;
      overflow: hidden;
    }

    .bg-pattern::before {
      content: '';
      position: absolute;
      width: 400px;
      height: 400px;
      background: radial-gradient(circle at 30% 70%, rgba(59, 130, 246, 0.05), transparent 50%);
      border-radius: 50%;
      top: -200px;
      left: -100px;
      animation: blob 8s ease-in-out infinite;
    }

    .bg-pattern::after {
      content: '';
      position: absolute;
      width: 300px;
      height: 300px;
      background: radial-gradient(circle at 70% 30%, rgba(16, 185, 129, 0.04), transparent 50%);
      border-radius: 50%;
      bottom: -150px;
      right: -50px;
      animation: blob 10s ease-in-out infinite;
    }

    .otp-input {
      width: 56px;
      height: 64px;
      text-align: center;
      font-size: 1.5rem;
      font-weight: 700;
      border: 2px solid #e2e8f0;
      border-radius: 16px;
      transition: all 0.3s;
      font-family: 'Outfit', sans-serif;
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(8px);
      color: #1e293b;
    }
    .otp-input:focus {
      border-color: #0ea5e9;
      background: rgba(255, 255, 255, 1);
      box-shadow: 0 0 0 3px rgba(14, 165, 233, 0.1);
      outline: none;
      transform: scale(1.05);
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.3); border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(255, 255, 255, 0.5); }

    .step-dot {
      width: 12px; height: 12px; border-radius: 50%;
      background: rgba(255, 255, 255, 0.4);
      transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
    }
    .step-dot.active {
      background: #ffffff;
      box-shadow: 0 0 12px rgba(255, 255, 255, 0.8);
      transform: scale(1.3);
    }
    .step-dot.completed {
      background: #4ade80;
      box-shadow: 0 0 12px rgba(74, 222, 128, 0.6);
    }

    .card-base {
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(20px);
      border: 1px solid #e2e8f0;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.08);
      transition: all 0.3s ease;
    }

    .card-base:hover {
      box-shadow: 0 30px 80px rgba(14, 165, 233, 0.08);
      border-color: #cbd5e1;
    }

    .feature-badge {
      display: inline-block;
      padding: 6px 12px;
      background: linear-gradient(135deg, rgba(99,102,241,0.2), rgba(74,222,128,0.2));
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      color: #4338ca;
    }

    .input-icon {
      transition: all 0.3s ease;
    }

    .input-field:focus ~ .input-icon,
    .input-field:focus-within ~ .input-icon {
      color: #6366f1;
      transform: scale(1.1);
    }

    .side-graphic {
      position: fixed;
      opacity: 0.08;
      pointer-events: none;
      font-size: 300px;
      line-height: 1;
    }

    .success-icon {
      animation: bounce-in 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    }
  </style>
  <style>body { box-sizing: border-box; }</style>
  <script src="/_sdk/data_sdk.js" type="text/javascript"></script>
 </head>
 <body class="h-full">
  <div id="app" class="h-full w-full overflow-auto bg-pattern" style="min-height:100%;"><!-- Side Graphics -->
   <div class="side-graphic" style="top: 10%; left: 5%; color: #0ea5e9;">
    📦
   </div>
   <div class="side-graphic" style="bottom: 15%; right: 8%; color: #0ea5e9;">
    🏭
   </div>
   <div class="side-graphic" style="top: 50%; right: 3%; color: #0ea5e9;">
    📊
   </div><!-- Toast Container -->
   <div id="toast-container" class="fixed top-4 right-4 z-50 flex flex-col gap-2" style="pointer-events:none;"></div><!-- Main Content -->
   <main id="main-content" class="flex items-center justify-center min-h-full w-full px-4 py-8 relative z-10">
   </main>
  </div>
  <script>
    // ===== STATE =====
    const state = {
      currentPage: 'login', // login | signup | dashboard | products | receipts | deliveries | transfers | adjustments
      isLoggedIn: false,
      userRole: '',
      loading: false,
      // Login
      loginEmail: '',
      loginPassword: '',
      loginShowPass: false,
      loginRemember: false,
      // Signup
      signupName: '',
      signupEmail: '',
      signupPassword: '',
      signupConfirm: '',
      signupRole: '',
      signupShowPass: false,
      signupShowConfirm: false,
      // Forgot
      forgotEmail: '',
      // OTP
      otp: ['', '', '', '', '', ''],
      otpVerified: false,
      otpAttempts: 0,
      // New password
      newPassword: '',
      newConfirm: '',
      newShowPass: false,
      newShowConfirm: false,
      // Dashboard filters
      dashboardFilter: 'all',
      // Product management
      productSearch: '',
      productCategory: 'all',
      productShowForm: false,
      productFormMode: 'add', // add | edit
      productEditId: null,
      productForm: {
        name: '',
        sku: '',
        category: '',
        quantity: '',
        min_stock: '',
        location: '',
        supplier: ''
      },
      // Receipt management
      receiptShowForm: false,
      receiptForm: {
        supplier: '',
        product_id: '',
        quantity: ''
      },
      receipts: [],
      // Delivery management
      deliveryShowForm: false,
      deliveryForm: {
        product_id: '',
        quantity: ''
      },
      deliveries: [],
      // Transfer management
      transferShowForm: false,
      transferForm: {
        from_warehouse: '',
        to_warehouse: '',
        product_id: '',
        quantity: ''
      },
      transfers: [],
      // Adjustment management
      adjustmentShowForm: false,
      adjustmentForm: {
        product_id: '',
        location: '',
        actual_count: ''
      },
      adjustments: [],
      // Staff tasks
      staffTasks: [],
      staffShowTaskForm: false,
      staffTaskForm: {
        type: '', // transfer | picking | shelving | counting
        product_id: '',
        quantity: '',
        from_location: '',
        to_location: ''
      },
      // Registered emails (simulated)
      registeredEmails: ['admin@waremind.com', 'staff@waremind.com'],
      // Data
      products: [],
      warehouses: ['Warehouse A', 'Warehouse B', 'Warehouse C'],
      suppliers: ['Supplier One', 'Supplier Two', 'Supplier Three'],
      categories: ['Electronics', 'Clothing', 'Food', 'Furniture', 'Other'],
      // Errors
      errors: {}
    };

    // ===== CONFIG =====
    const defaultConfig = {
      app_title: 'WareMind',
      app_tagline: 'Intelligent Warehouse Management',
      background_color: '#f8fafc',
      surface_color: '#ffffff',
      text_color: '#1e293b',
      primary_action: '#0ea5e9',
      secondary_action: '#64748b',
      font_family: 'DM Sans',
      font_size: 15
    };

    // ===== TOAST =====
    function showToast(message, type = 'success') {
      const container = document.getElementById('toast-container');
      const toast = document.createElement('div');
      toast.style.pointerEvents = 'auto';
      const colors = {
        success: 'bg-emerald-500',
        error: 'bg-red-500',
        info: 'bg-brand-500'
      };
      const icons = {
        success: 'check-circle',
        error: 'alert-circle',
        info: 'info'
      };
      toast.className = `toast-enter flex items-center gap-3 px-5 py-3 rounded-xl text-white shadow-lg ${colors[type]}`;
      toast.innerHTML = `<i data-lucide="${icons[type]}" style="width:20px;height:20px;"></i><span class="font-medium text-sm">${message}</span>`;
      container.appendChild(toast);
      lucide.createIcons();
      setTimeout(() => {
        toast.className = toast.className.replace('toast-enter', 'toast-exit');
        setTimeout(() => toast.remove(), 300);
      }, 3500);
    }

    // ===== VALIDATION =====
    function validateEmail(email) {
      return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
    }

    function validateLoginForm() {
      const errors = {};
      if (!state.loginEmail) errors.loginEmail = 'Email is required';
      else if (!validateEmail(state.loginEmail)) errors.loginEmail = 'Enter a valid email';
      if (!state.loginPassword) errors.loginPassword = 'Password is required';
      else if (state.loginPassword.length < 8) errors.loginPassword = 'Password must be at least 8 characters';
      state.errors = errors;
      return Object.keys(errors).length === 0;
    }

    function validateSignupForm() {
      const errors = {};
      if (!state.signupName.trim()) errors.signupName = 'Full name is required';
      if (!state.signupEmail) errors.signupEmail = 'Email is required';
      else if (!validateEmail(state.signupEmail)) errors.signupEmail = 'Enter a valid email';
      else if (state.registeredEmails.includes(state.signupEmail.toLowerCase())) errors.signupEmail = 'Email already registered';
      if (!state.signupPassword) errors.signupPassword = 'Password is required';
      else if (state.signupPassword.length < 8) errors.signupPassword = 'Minimum 8 characters required';
      if (!state.signupConfirm) errors.signupConfirm = 'Please confirm your password';
      else if (state.signupPassword !== state.signupConfirm) errors.signupConfirm = 'Passwords do not match';
      if (!state.signupRole) errors.signupRole = 'Please select a role';
      state.errors = errors;
      return Object.keys(errors).length === 0;
    }

    // ===== HELPERS =====
    function isLoginValid() {
      return state.loginEmail && state.loginPassword;
    }
    function isSignupValid() {
      return state.signupName && state.signupEmail && state.signupPassword && state.signupConfirm && state.signupRole;
    }

    function simulateDelay(ms = 1500) {
      return new Promise(r => setTimeout(r, ms));
    }

    // ===== RENDER HELPERS =====
    function inputHTML(id, label, type, value, icon, error, extra = '') {
      const cfg = window.elementSdk ? window.elementSdk.config : defaultConfig;
      const fontSize = cfg.font_size || defaultConfig.font_size;
      const textColor = cfg.text_color || defaultConfig.text_color;
      return `
        <div class="space-y-1.5">
          <label for="${id}" class="block font-medium" style="font-size:${fontSize * 0.87}px;color:${textColor};">${label}</label>
          <div class="relative">
            <span class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400"><i data-lucide="${icon}" style="width:18px;height:18px;"></i></span>
            <input id="${id}" type="${type}" value="${value.replace(/"/g, '&quot;')}" placeholder="${label}"
              class="input-field w-full pl-10 pr-${extra ? '10' : '4'} py-3 rounded-xl border-2 ${error ? 'border-red-400' : 'border-slate-200'} bg-white/80 outline-none"
              style="font-size:${fontSize}px;color:${textColor};"
              oninput="handleInput('${id}', this.value)" autocomplete="off">
            ${extra}
          </div>
          ${error ? `<p class="text-red-500 text-xs mt-1 flex items-center gap-1"><i data-lucide="alert-triangle" style="width:12px;height:12px;"></i>${error}</p>` : ''}
        </div>`;
    }

    function toggleBtn(field) {
      return `<button type="button" onclick="togglePassword('${field}')" class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-brand-500 transition-colors" aria-label="Toggle password visibility">
        <i data-lucide="${state[field] ? 'eye-off' : 'eye'}" style="width:18px;height:18px;"></i>
      </button>`;
    }

    function logoHTML() {
      const cfg = window.elementSdk ? window.elementSdk.config : defaultConfig;
      const title = cfg.app_title || defaultConfig.app_title;
      const tagline = cfg.app_tagline || defaultConfig.app_tagline;
      const primary = cfg.primary_action || defaultConfig.primary_action;
      const textColor = cfg.text_color || defaultConfig.text_color;
      const fontSize = cfg.font_size || defaultConfig.font_size;
      return `
        <div class="flex flex-col items-center mb-6">
          <div class="float-anim mb-4 w-16 h-16 rounded-2xl flex items-center justify-center shadow-lg" style="background:linear-gradient(135deg,${primary},${primary}dd);">
            <i data-lucide="package" style="width:32px;height:32px;color:#fff;"></i>
          </div>
          <h1 class="font-display font-bold tracking-tight" style="font-size:${fontSize * 1.8}px;color:${textColor};">${title}</h1>
          <p class="mt-1" style="font-size:${fontSize * 0.87}px;color:${cfg.secondary_action || defaultConfig.secondary_action};">${tagline}</p>
        </div>`;
    }

    function cardWrap(content, animClass = 'anim-fade-up') {
      const cfg = window.elementSdk ? window.elementSdk.config : defaultConfig;
      const surface = cfg.surface_color || defaultConfig.surface_color;
      return `<div class="${animClass} card-base w-full max-w-md rounded-3xl p-8 shadow-2xl" style="background:${surface}; border: 1px solid rgba(255, 255, 255, 0.3);">${content}</div>`;
    }

    function spinnerHTML() {
      return `<span class="spinner inline-block w-5 h-5 border-2 border-white border-t-transparent rounded-full"></span>`;
    }

    // ===== PAGE RENDERS =====
    function renderLogin() {
      const cfg = window.elementSdk ? window.elementSdk.config : defaultConfig;
      const primary = cfg.primary_action || defaultConfig.primary_action;
      const secondary = cfg.secondary_action || defaultConfig.secondary_action;
      const fontSize = cfg.font_size || defaultConfig.font_size;
      const disabled = !isLoginValid() || state.loading;

      return cardWrap(`
        ${logoHTML()}
        <form onsubmit="handleLogin(event)" class="space-y-5" novalidate>
          ${inputHTML('loginEmail', 'Email Address', 'email', state.loginEmail, 'mail', state.errors.loginEmail)}
          ${inputHTML('loginPassword', 'Password', state.loginShowPass ? 'text' : 'password', state.loginPassword, 'lock', state.errors.loginPassword, toggleBtn('loginShowPass'))}

          <div class="flex items-center justify-between pt-2">
            <label class="flex items-center gap-2 cursor-pointer select-none group transition-all" style="font-size:${fontSize * 0.87}px;color:${secondary};">
              <input type="checkbox" ${state.loginRemember ? 'checked' : ''} onchange="state.loginRemember=this.checked" class="w-4 h-4 rounded border-slate-300 text-brand-500 focus:ring-brand-500 accent-brand-500 cursor-pointer">
              <span class="group-hover:text-slate-900 transition-colors">Remember me</span>
            </label>
            <button type="button" onclick="navigate('forgot')" class="font-medium hover:underline transition-all transform hover:scale-105" style="font-size:${fontSize * 0.87}px;color:${primary};">Forgot Password?</button>
          </div>

          <button type="submit" ${disabled ? 'disabled' : ''} class="btn-primary w-full py-3 rounded-xl text-white font-semibold flex items-center justify-center gap-2 group" style="font-size:${fontSize}px;">
            ${state.loading ? spinnerHTML() + ' Signing in...' : '<i data-lucide="log-in" style="width:18px;height:18px;"></i> Sign In'}
          </button>
        </form>

        <p class="text-center mt-6" style="font-size:${fontSize * 0.87}px;color:${secondary};">
          Don't have an account?
          <button onclick="navigate('signup')" class="font-semibold hover:underline transition-all transform hover:scale-105" style="color:${primary};">Create Account</button>
        </p>

        <div class="mt-6 pt-6 border-t border-slate-100/40">
          <div class="grid grid-cols-3 gap-3 text-xs font-medium" style="color:${secondary};">
            <div class="flex flex-col items-center gap-1 p-2 rounded-lg hover:bg-slate-50/50 transition-all">
              <i data-lucide="shield-check" style="width:18px;height:18px;color:${primary};"></i>
              <span>Secure</span>
            </div>
            <div class="flex flex-col items-center gap-1 p-2 rounded-lg hover:bg-slate-50/50 transition-all">
              <i data-lucide="lock" style="width:18px;height:18px;color:#10b981;"></i>
              <span>Encrypted</span>
            </div>
            <div class="flex flex-col items-center gap-1 p-2 rounded-lg hover:bg-slate-50/50 transition-all">
              <i data-lucide="warehouse" style="width:18px;height:18px;color:#f59e0b;"></i>
              <span>Ready</span>
            </div>
          </div>
        </div>
      `);
    }

    function renderSignup() {
      const cfg = window.elementSdk ? window.elementSdk.config : defaultConfig;
      const primary = cfg.primary_action || defaultConfig.primary_action;
      const secondary = cfg.secondary_action || defaultConfig.secondary_action;
      const textColor = cfg.text_color || defaultConfig.text_color;
      const fontSize = cfg.font_size || defaultConfig.font_size;
      const disabled = !isSignupValid() || state.loading;

      return cardWrap(`
        ${logoHTML()}
        <h2 class="text-center font-display font-bold mb-1" style="font-size:${fontSize * 1.4}px;color:${textColor};">Create Account</h2>
        <p class="text-center mb-6 text-sm" style="color:${secondary};">Join WareMind and manage your warehouse intelligently</p>

        <form onsubmit="handleSignup(event)" class="space-y-4" novalidate>
          ${inputHTML('signupName', 'Full Name', 'text', state.signupName, 'user', state.errors.signupName)}
          ${inputHTML('signupEmail', 'Email Address', 'email', state.signupEmail, 'mail', state.errors.signupEmail)}

    async function handleLogin(e) {
      e.preventDefault();
      if (!validateLoginForm()) { render(); return; }
      state.loading = true;
      render();

      // API placeholder
      await simulateDelay();

      // Simulate: check registered emails
      if (!state.registeredEmails.includes(state.loginEmail.toLowerCase())) {
        state.loading = false;
        state.errors.loginEmail = 'No account found with this email';
        render();
        showToast('Invalid credentials. Please try again.', 'error');
        return;
      }

      state.loading = false;
      state.isLoggedIn = true;
      state.userRole = 'manager';
      showToast('Welcome back! Loading dashboard...', 'success');
      render();
    }

    async function handleSignup(e) {
      e.preventDefault();
      if (!validateSignupForm()) { render(); return; }
      state.loading = true;
      render();

      await simulateDelay();

      // Simulate registration
      state.registeredEmails.push(state.signupEmail.toLowerCase());
      state.loading = false;
      showToast('Account created successfully!', 'success');
      // Reset signup fields
      state.signupName = '';
      state.signupEmail = '';
      state.signupPassword = '';
      state.signupConfirm = '';
      state.signupRole = '';
      navigate('login');
    }

    async function handleForgot(e) {
      e.preventDefault();
      const errors = {};
      if (!state.forgotEmail) errors.forgotEmail = 'Email is required';
      else if (!validateEmail(state.forgotEmail)) errors.forgotEmail = 'Enter a valid email';
      else if (!state.registeredEmails.includes(state.forgotEmail.toLowerCase())) errors.forgotEmail = 'No account found with this email';
      if (Object.keys(errors).length) {
        state.errors = errors;
        render();
        return;
      }
      state.loading = true;
      render();

      await simulateDelay(1200);

      state.loading = false;
      state.otp = ['', '', '', '', '', ''];
      state.otpVerified = false;
      state.otpAttempts = 0;
      showToast('OTP sent to your email!', 'info');
      navigate('otp');
    }



    function handleOTPInput(index, el) {
      const val = el.value.replace(/\D/g, '');
      state.otp[index] = val.slice(-1);
      el.value = state.otp[index];
      if (val && index < 5) {
        const next = document.querySelector(`[data-otp="${index + 1}"]`);
        if (next) next.focus();
      }
      updateButtons();
    }

    function handleOTPKey(e, index) {
      if (e.key === 'Backspace' && !state.otp[index] && index > 0) {
        const prev = document.querySelector(`[data-otp="${index - 1}"]`);
        if (prev) { prev.focus(); state.otp[index - 1] = ''; prev.value = ''; }
      }
    }

    async function handleOTPSubmit(e) {
      e.preventDefault();
      if (state.otpExpired) {
        showToast('OTP has expired. Please request a new one.', 'error');
        return;
      }

      const code = state.otp.join('');
      if (code.length !== 6) return;

      state.loading = true;
      render();
      await simulateDelay(1000);

      // Simulate OTP check (accept any 6 digits for demo)
      state.otpAttempts++;
      state.loading = false;
      state.otpVerified = true;
      showToast('OTP verified successfully! Set your new password.', 'success');
      navigate('newpassword');
    }

    function resendOTP() {
      if (true) {
        state.otp = ['', '', '', '', '', ''];
        state.otpVerified = false;
        state.otpAttempts = 0;
        showToast('New OTP sent!', 'info');
        render();
      }
    }

    async function handleNewPassword(e) {
      e.preventDefault();
      const errors = {};
      if (!state.newPassword) errors.newPassword = 'Password is required';
      else if (state.newPassword.length < 8) errors.newPassword = 'Minimum 8 characters required';
      if (!state.newConfirm) errors.newConfirm = 'Please confirm your password';
      else if (state.newPassword !== state.newConfirm) errors.newConfirm = 'Passwords do not match';
      if (Object.keys(errors).length) {
        state.errors = errors;
        render();
        return;
      }

      state.loading = true;
      render();
      await simulateDelay();

      state.loading = false;
      showToast('Password reset successfully!', 'success');
      state.newPassword = '';
      state.newConfirm = '';
      navigate('success');
    }

        const adjustment = {
          id: Date.now().toString(),
          product_id: state.adjustmentForm.product_id,
          product_name: product.name,
          location: state.adjustmentForm.location,
          old_quantity: oldQty,
          new_quantity: newQty,
          difference: diff,
          status: 'completed',
          created_at: new Date().toISOString()
        };
        state.adjustments.push(adjustment);
        showToast(`Adjustment applied! Qty changed from ${oldQty} to ${newQty}`, 'success');
      }

      state.loading = false;
      state.adjustmentShowForm = false;
      state.adjustmentForm = { product_id: '', location: '', actual_count: '' };
      render();
    }

      const fontSize = cfg.font_size || defaultConfig.font_size;

      return `

          <div class="flex items-center justify-between mb-8">

            </div>
          </div>

          <div class="card-base rounded-2xl p-6">

            <div class="space-y-3">
              ${countingTasks.length > 0
                ? countingTasks.map(task => {
                    const product = state.products.find(p => p.id === task.product_id);
                    return `
                      <div class="p-4 rounded-lg border-2" style="border-color:#fef08a;">
                        <div class="flex items-start justify-between mb-3">
                          <div>
                            <p class="font-semibold text-lg" style="color:${textColor};">${product?.name || 'Unknown'}</p>
                            <p style="font-size:${fontSize * 0.8}px;color:${secondary};">SKU: ${product?.sku || 'N/A'}</p>
                          </div>
                        </div>
                        <div class="bg-yellow-50 p-3 rounded-lg mb-3">
                          <p style="font-size:${fontSize * 0.85}px;color:#713f12;font-weight:500;">📊 Count items at: ${task.from_location || 'Location TBD'}</p>
                          <p style="font-size:${fontSize * 0.8}px;color:#913f12;margin-top:0.25rem;">Expected: ${task.quantity} units</p>
                        </div>
                        <button onclick="completeStaffTask('${task.task_id}')" class="btn-primary w-full py-2 rounded-lg text-white font-semibold" style="background:linear-gradient(135deg,#f59e0b,#d97706);">
                          ✓ Count Verified
                        </button>
                      </div>
                    `;
                  }).join('')
                : `<p style="text-align:center;color:${secondary};padding:2rem;">No counting tasks assigned</p>`
              }
            </div>
          </div>
        </div>
      `;
    }

    // ===== ELEMENT SDK INIT =====
    window.elementSdk.init({
      defaultConfig,
      onConfigChange: async (config) => {
        const fontFamily = config.font_family || defaultConfig.font_family;
        const baseFontStack = "'DM Sans', sans-serif";
        document.body.style.fontFamily = `${fontFamily}, ${baseFontStack}`;

        const bg = config.background_color || defaultConfig.background_color;
        document.getElementById('app').style.background = bg;

        render();
      },
      mapToCapabilities: (config) => ({
        recolorables: [
          {
            get: () => config.background_color || defaultConfig.background_color,
            set: (v) => { config.background_color = v; window.elementSdk.setConfig({ background_color: v }); }
          },
          {
            get: () => config.surface_color || defaultConfig.surface_color,
            set: (v) => { config.surface_color = v; window.elementSdk.setConfig({ surface_color: v }); }
          },
          {
            get: () => config.text_color || defaultConfig.text_color,
            set: (v) => { config.text_color = v; window.elementSdk.setConfig({ text_color: v }); }
          },
          {
            get: () => config.primary_action || defaultConfig.primary_action,
            set: (v) => { config.primary_action = v; window.elementSdk.setConfig({ primary_action: v }); }
          },
          {
            get: () => config.secondary_action || defaultConfig.secondary_action,
            set: (v) => { config.secondary_action = v; window.elementSdk.setConfig({ secondary_action: v }); }
          }
        ],
        borderables: [],
        fontEditable: {
          get: () => config.font_family || defaultConfig.font_family,
          set: (v) => { config.font_family = v; window.elementSdk.setConfig({ font_family: v }); }
        },

      mapToEditPanelValues: (config) => new Map([
        ['app_title', config.app_title || defaultConfig.app_title],
        ['app_tagline', config.app_tagline || defaultConfig.app_tagline]
      ])
    });

    // Initial render
    render();
  </script>
